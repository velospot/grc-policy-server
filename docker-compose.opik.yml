services:
  opik-mysql:
    image: mysql:8.4.2
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${OPIK_MYSQL_ROOT_PASSWORD:-opik}
      MYSQL_DATABASE: ${OPIK_MYSQL_DATABASE:-opik}
      MYSQL_USER: ${OPIK_MYSQL_USER:-opik}
      MYSQL_PASSWORD: ${OPIK_MYSQL_PASSWORD:-opik}
    volumes:
      - opik_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 2s
      timeout: 2s
      retries: 120

  opik-redis:
    image: redis:7.2.4-alpine3.19
    restart: unless-stopped
    command: redis-server --requirepass ${OPIK_REDIS_PASSWORD:-opik}
    volumes:
      - opik_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${OPIK_REDIS_PASSWORD:-opik}", "ping"]
      interval: 2s
      timeout: 4s
      retries: 30

  opik-zookeeper:
    image: zookeeper:3.9.4
    restart: unless-stopped
    user: root
    environment:
      JVMFLAGS: "-Xmx512m"
      ZOO_4LW_COMMANDS_WHITELIST: "srvr,ruok"
      ZOO_DATA_DIR: /bitnami/zookeeper/data
      ZOO_DATA_LOG_DIR: /bitnami/zookeeper/data
    volumes:
      - opik_zookeeper:/bitnami/zookeeper
    entrypoint:
      - /bin/bash
      - -c
      - |
        mkdir -p /bitnami/zookeeper/data
        chown -R zookeeper:zookeeper /bitnami/zookeeper
        exec gosu zookeeper /docker-entrypoint.sh zkServer.sh start-foreground
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep -q imok"]
      interval: 2s
      timeout: 2s
      retries: 120

  opik-clickhouse-init:
    image: alpine:3.22.2
    volumes:
      - opik_clickhouse_config:/config
    command:
      - sh
      - -c
      - |
        mkdir -p /config
        chown -R 1000:1000 /config

  opik-clickhouse:
    image: clickhouse/clickhouse-server:25.3.6.56-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${OPIK_CLICKHOUSE_DB:-opik}
      CLICKHOUSE_USER: ${OPIK_CLICKHOUSE_USER:-opik}
      CLICKHOUSE_PASSWORD: ${OPIK_CLICKHOUSE_PASSWORD:-opik}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - opik_clickhouse:/var/lib/clickhouse
      - opik_clickhouse_logs:/var/log/clickhouse-server
      - opik_clickhouse_config:/etc/clickhouse-server/config.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    depends_on:
      opik-zookeeper:
        condition: service_healthy
      opik-clickhouse-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 2s
      timeout: 2s
      retries: 120

  opik-minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${OPIK_MINIO_ROOT_USER:-THAAIOSFODNN7EXAMPLE}
      MINIO_ROOT_PASSWORD: ${OPIK_MINIO_ROOT_PASSWORD:-LESlrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY}
    command: server --console-address ":9090" /data
    volumes:
      - opik_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 10s
      retries: 30

  opik-minio-client:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    depends_on:
      opik-minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        /usr/bin/mc alias set s3 http://opik-minio:9000 $${OPIK_MINIO_ROOT_USER:-THAAIOSFODNN7EXAMPLE} $${OPIK_MINIO_ROOT_PASSWORD:-LESlrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY} --api S3v4
        /usr/bin/mc mb --ignore-existing s3/public
        /usr/bin/mc anonymous set download s3/public/

  opik-backend:
    image: ghcr.io/comet-ml/opik/opik-backend:${OPIK_VERSION:-1.11.2}
    restart: unless-stopped
    command: ["bash", "-c", "./run_db_migrations.sh && ./entrypoint.sh"]
    environment:
      STATE_DB_PROTOCOL: jdbc:mysql://
      STATE_DB_URL: opik-mysql:3306/opik?createDatabaseIfNotExist=true&rewriteBatchedStatements=true
      STATE_DB_DATABASE_NAME: ${OPIK_MYSQL_DATABASE:-opik}
      STATE_DB_USER: ${OPIK_MYSQL_USER:-opik}
      STATE_DB_PASS: ${OPIK_MYSQL_PASSWORD:-opik}
      ANALYTICS_DB_MIGRATIONS_URL: jdbc:clickhouse://opik-clickhouse:8123
      ANALYTICS_DB_MIGRATIONS_USER: ${OPIK_CLICKHOUSE_USER:-opik}
      ANALYTICS_DB_MIGRATIONS_PASS: ${OPIK_CLICKHOUSE_PASSWORD:-opik}
      ANALYTICS_DB_PROTOCOL: HTTP
      ANALYTICS_DB_HOST: opik-clickhouse
      ANALYTICS_DB_PORT: 8123
      ANALYTICS_DB_DATABASE_NAME: ${OPIK_CLICKHOUSE_DB:-opik}
      ANALYTICS_DB_USERNAME: ${OPIK_CLICKHOUSE_USER:-opik}
      ANALYTICS_DB_PASS: ${OPIK_CLICKHOUSE_PASSWORD:-opik}
      JAVA_OPTS: "-Dliquibase.propertySubstitutionEnabled=true -XX:+UseG1GC -XX:MaxRAMPercentage=80.0"
      REDIS_URL: redis://:${OPIK_REDIS_PASSWORD:-opik}@opik-redis:6379/
      OPIK_USAGE_REPORT_ENABLED: ${OPIK_USAGE_REPORT_ENABLED:-false}
      AWS_ACCESS_KEY_ID: ${OPIK_MINIO_ROOT_USER:-THAAIOSFODNN7EXAMPLE}
      AWS_SECRET_ACCESS_KEY: ${OPIK_MINIO_ROOT_PASSWORD:-LESlrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY}
      IS_MINIO: "true"
      S3_URL: http://opik-minio:9000
      PYTHON_EVALUATOR_URL: http://opik-python-backend:8000
      TOGGLE_OPIK_AI_ENABLED: "false"
      TOGGLE_GUARDRAILS_ENABLED: "false"
      TOGGLE_WELCOME_WIZARD_ENABLED: "true"
      TOGGLE_RUNNERS_ENABLED: "false"
      CORS: "true"
      ATTACHMENTS_STRIP_MIN_SIZE: "256000"
      JACKSON_MAX_STRING_LENGTH: "104857600"
    ports:
      - "${OPIK_BACKEND_PORT:-5174}:8080"
    depends_on:
      opik-mysql:
        condition: service_healthy
      opik-clickhouse:
        condition: service_healthy
      opik-minio:
        condition: service_healthy
      opik-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health-check"]
      interval: 2s
      timeout: 30s
      retries: 120

  opik-python-backend:
    image: ghcr.io/comet-ml/opik/opik-python-backend:${OPIK_VERSION:-1.11.2}
    restart: unless-stopped
    privileged: true
    environment:
      OPIK_VERSION: ${OPIK_VERSION:-1.11.2}
      OPIK_REVERSE_PROXY_URL: http://opik-frontend:5173/api
      OPIK_URL_OVERRIDE: http://opik-backend:8080
      PYTHON_BACKEND_PORT: 8000
      REDIS_URL: redis://:${OPIK_REDIS_PASSWORD:-opik}@opik-redis:6379/0
      RQ_WORKER_ENABLED: "true"
      PYTHON_CODE_EXECUTOR_STRATEGY: process
      PYTHON_CODE_EXECUTOR_EXEC_TIMEOUT_IN_SECS: 3
      PYTHON_CODE_EXECUTOR_ALLOW_NETWORK: "false"
      PYTHON_CODE_EXECUTOR_CPU_SHARES: 512
      PYTHON_CODE_EXECUTOR_MEM_LIMIT: 256m
    tmpfs:
      - /var/lib/docker
    depends_on:
      opik-redis:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8000/healthcheck"]
      interval: 2s
      timeout: 30s
      retries: 60

  opik-frontend:
    image: ghcr.io/comet-ml/opik/opik-frontend:${OPIK_VERSION:-1.11.2}
    restart: unless-stopped
    environment:
      OPIK_VERSION: ${OPIK_VERSION:-1.11.2}
      NGINX_PORT: 5173
      NGINX_CONF_SUFFIX: local
      OTEL_TRACE: "off"
    ports:
      - "${OPIK_FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./opik_nginx_default_local.conf:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      opik-backend:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "curl --fail --fail-early http://localhost:5173/health"]
      interval: 2s
      timeout: 30s
      retries: 30

volumes:
  opik_mysql:
  opik_redis:
  opik_zookeeper:
  opik_clickhouse:
  opik_clickhouse_logs:
  opik_clickhouse_config:
  opik_minio:
